name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      matrix:
        include:
          - name: postgres
            cargo_flags: --no-default-features --features postgres,test-support,legacy-networking
            install_postgres_deps: true
            install_sqlite_deps: false
            rstest_timeout: false
          - name: sqlite
            cargo_flags: --features sqlite,test-support
            install_postgres_deps: false
            install_sqlite_deps: true
            rstest_timeout: true
          - name: wireframe-only
            cargo_flags: --no-default-features --features sqlite,toml,test-support
            install_postgres_deps: false
            install_sqlite_deps: true
            rstest_timeout: true
      fail-fast: false
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
      WHITAKER_INSTALLER_REV: 9c154ead8d72dc4b26b5c67f2575fd891bc99962
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: leynos/shared-actions/.github/actions/setup-rust@aebb3f5b831102e2a10ef909c83d7d50ea86c332
        with:
          install-postgres-deps: ${{ matrix.install_postgres_deps }}
          install-sqlite-deps: ${{ matrix.install_sqlite_deps }}
      - name: Cache Cargo directories
        uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.8.1
      - name: Install cargo-nextest
        run: |
          if ! cargo nextest --version >/dev/null 2>&1; then
            cargo binstall --no-confirm cargo-nextest
          fi
      - name: Export POSTGRES_TEST_URL
        if: matrix.name == 'postgres'
        uses: ./.github/actions/export-postgres-url
        with:
          url: postgres://postgres:password@127.0.0.1/test
      - name: Format
        run: make check-fmt
      - name: Lint with Clippy
        run: RUSTFLAGS="-D warnings" cargo clippy ${{ matrix.cargo_flags }} --workspace --all-targets -- -D warnings
      - name: Cache Whitaker installer
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-whitaker-${{ env.WHITAKER_INSTALLER_REV }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Lint with Whitaker
        run: |
          if ! command -v whitaker-installer >/dev/null 2>&1; then
            cargo install --locked \
              --git https://github.com/leynos/whitaker \
              --rev "${WHITAKER_INSTALLER_REV}" \
              whitaker-installer
          fi
          if ! command -v whitaker >/dev/null 2>&1; then
            whitaker-installer
          fi
          if [[ -d "${HOME}/.local/share/whitaker/lints" ]]; then
            find "${HOME}/.local/share/whitaker/lints" \
              -type f \
              \( -name 'lib*@*.so' -o -name 'lib*@*.dylib' -o -name '*@*.dll' \) \
              ! -name 'libwhitaker_suite@*' \
              ! -name 'whitaker_suite@*' \
              -delete
          fi
          RUSTFLAGS="-D warnings" whitaker --all -- ${{ matrix.cargo_flags }} --all-targets
      - name: Test
        run: |
          if [[ "${{ matrix.rstest_timeout }}" == "true" ]]; then
            RSTEST_TIMEOUT=20 RUSTFLAGS="-D warnings" cargo nextest run ${{ matrix.cargo_flags }} \
              --filter-expr 'not package(=validator)'
          else
            RUSTFLAGS="-D warnings" cargo nextest run ${{ matrix.cargo_flags }} \
              --filter-expr 'not package(=validator)'
          fi

  validator-sqlite:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
      HX_BIN_DIR: ${{ github.workspace }}/.bin
      HX_WORK_ROOT: ${{ github.workspace }}/.cache/hx
      HX_SRC_LINK: ${{ github.workspace }}/.cache/synhx-client
      MXD_VALIDATOR_FAIL_CLOSED: "true"
      MXD_TEST_BIND_HOST: "127.0.0.1"
    steps:
      - uses: actions/checkout@v5
      - uses: leynos/shared-actions/.github/actions/setup-rust@aebb3f5b831102e2a10ef909c83d7d50ea86c332
        with:
          install-sqlite-deps: true
      - name: Cache Cargo directories
        uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.8.1
      - name: Add validator bin directory to PATH
        run: echo "${HX_BIN_DIR}" >> "${GITHUB_PATH}"
      - name: Install SynHX
        run: ./scripts/install-synhx.sh
      - name: Sanity-check hx does not report Helix
        run: |
          set -o pipefail
          timeout 1 hx --version 2>&1 | tee /tmp/hx-version.log || true
          if rg -qi 'helix' /tmp/hx-version.log; then
            echo "hx resolves to Helix, not SynHX" >&2
            exit 1
          fi
      - name: Build wireframe server for validator
        run: make validator-sqlite-server
      - name: Run validator harness
        run: make test-validator-sqlite

  coverage:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
      HX_BIN_DIR: ${{ github.workspace }}/.bin
      HX_WORK_ROOT: ${{ github.workspace }}/.cache/hx
      HX_SRC_LINK: ${{ github.workspace }}/.cache/synhx-client
      MXD_VALIDATOR_FAIL_CLOSED: "true"
      MXD_TEST_BIND_HOST: "127.0.0.1"
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: leynos/shared-actions/.github/actions/setup-rust@aebb3f5b831102e2a10ef909c83d7d50ea86c332
        with:
          install-sqlite-deps: true
          install-postgres-deps: true
      - name: Cache Cargo directories
        uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.8.1
      - name: Add validator bin directory to PATH
        run: echo "${HX_BIN_DIR}" >> "${GITHUB_PATH}"
      - name: Install SynHX
        run: ./scripts/install-synhx.sh
      - name: Sanity-check hx does not report Helix
        run: |
          set -o pipefail
          timeout 1 hx --version 2>&1 | tee /tmp/hx-version.log || true
          if rg -qi 'helix' /tmp/hx-version.log; then
            echo "hx resolves to Helix, not SynHX" >&2
            exit 1
          fi
      - name: Build wireframe server for coverage
        run: make validator-sqlite-server validator-postgres-server
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - uses: oven-sh/setup-bun@v2
      - uses: ./.github/actions/export-postgres-url
        with:
          url: postgres://postgres:password@127.0.0.1/test
      - name: Generate coverage for SQLite
        uses: ./.github/actions/generate-coverage
        env:
          MXD_VALIDATOR_SERVER_BINARY: ${{ github.workspace }}/target/debug/mxd-wireframe-server
        with:
          features: sqlite test-support
          output-path: lcov-sqlite.info
      - name: Generate coverage for Postgres
        uses: ./.github/actions/generate-coverage
        env:
          MXD_VALIDATOR_SERVER_BINARY: ${{ github.workspace }}/target/postgres/debug/mxd-wireframe-server
          POSTGRES_TEST_URL: postgres://postgres:password@127.0.0.1/test
        with:
          with-default-features: false
          features: postgres test-support
          output-path: lcov-postgres.info
      - name: Merge coverage results
        run: bun x lcov-result-merger lcov-sqlite.info lcov-postgres.info > lcov.info
