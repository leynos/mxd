name: CI

on:
  pull_request:
    branches: [main]

jobs:
  docs-tooling:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      MERMAN_CLI_VERSION: '0.7.0'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Set up Rust for Merman
        run: rustup toolchain install 1.95.0
      - name: Cache Merman CLI
        id: cache-merman-cli
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v4.3.0
        with:
          path: ~/.cargo/bin/merman-cli
          key: merman-cli-${{ runner.os }}-${{ runner.arch }}-${{ env.MERMAN_CLI_VERSION }}
      - name: Install Merman CLI
        if: steps.cache-merman-cli.outputs.cache-hit != 'true'
        run: cargo +1.95.0 install merman-cli --version "=${MERMAN_CLI_VERSION}" --locked
      - name: Install Nixie
        run: uv tool install nixie-cli==1.1.0
      - name: Enforce en-GB-oxendict spelling
        run: make spelling
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25
        with:
          globs: |
            **/*.md
            !**/.uv-cache/**
            !**/.uv-tools/**
            !**/target/**
            !**/dist/**
      - name: Validate Mermaid diagrams
        run: make nixie

  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      matrix:
        include:
          - name: postgres
            cargo_flags: --no-default-features --features postgres,test-support,legacy-networking
            install_postgres_deps: true
            install_sqlite_deps: false
            rstest_timeout: false
          - name: sqlite
            cargo_flags: --features sqlite,test-support
            install_postgres_deps: false
            install_sqlite_deps: true
            rstest_timeout: true
          - name: wireframe-only
            cargo_flags: --no-default-features --features sqlite,toml,test-support
            install_postgres_deps: false
            install_sqlite_deps: true
            rstest_timeout: true
      fail-fast: false
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
      WHITAKER_INSTALLER_VERSION: '0.2.6'
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: leynos/shared-actions/.github/actions/setup-rust@18bed1ca49a6de3d8882bd72635a32ae3f023d57
        with:
          install-postgres-deps: ${{ matrix.install_postgres_deps }}
          install-sqlite-deps: ${{ matrix.install_sqlite_deps }}
      - name: Cache Cargo directories
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install cargo-nextest
        run: |
          if ! cargo nextest --version >/dev/null 2>&1; then
            cargo binstall --locked --no-confirm cargo-nextest
          fi
      # Dependency audits report advisories against the whole lockfile, so a
      # newly published advisory would fail every Dependabot PR regardless of
      # content and deadlock auto-merge. The scheduled audit workflow covers
      # Dependabot merges instead.
      - name: Install cargo-audit
        if: matrix.name == 'postgres' && github.actor != 'dependabot[bot]'
        run: cargo binstall --no-confirm cargo-audit
      - name: Audit dependencies
        if: matrix.name == 'postgres' && github.actor != 'dependabot[bot]'
        run: make audit
      - name: Export POSTGRES_TEST_URL
        if: matrix.name == 'postgres'
        uses: ./.github/actions/export-postgres-url
        with:
          url: postgres://postgres:password@127.0.0.1/test
      - name: Format
        run: make check-fmt
      - name: Lint with Clippy
        run: RUSTFLAGS="-D warnings" cargo clippy ${{ matrix.cargo_flags }} --workspace --all-targets -- -D warnings
      - name: Cache Whitaker installer
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/whitaker-installer
            ~/.cache/cargo-binstall
          key: whitaker-installer-${{ runner.os }}-${{ runner.arch }}-${{ env.WHITAKER_INSTALLER_VERSION }}
      - name: Install Whitaker
        run: |
          # The rust-cache step restores ~/.cargo/bin, which can resurrect a
          # stale whitaker-installer; verify the version rather than merely
          # checking that a binary exists, and force-reinstall on mismatch.
          installed_version=""
          if command -v whitaker-installer >/dev/null 2>&1; then
            installed_version="$(whitaker-installer --version 2>/dev/null | awk '{print $2}')"
          fi
          if [ "${installed_version}" != "${WHITAKER_INSTALLER_VERSION}" ]; then
            if cargo binstall --version >/dev/null 2>&1; then
              cargo binstall --no-confirm --locked --force "whitaker-installer@${WHITAKER_INSTALLER_VERSION}"
            else
              echo "cargo-binstall unavailable; building whitaker-installer from crates.io"
              cargo install --locked --force whitaker-installer --version "${WHITAKER_INSTALLER_VERSION}"
            fi
          fi
          whitaker-installer
      - name: Lint with Whitaker
        run: RUSTFLAGS="-D warnings" whitaker --all -- ${{ matrix.cargo_flags }} --all-targets
      - name: Test
        run: |
          if [[ "${{ matrix.rstest_timeout }}" == "true" ]]; then
            RSTEST_TIMEOUT=20 RUSTFLAGS="-D warnings" cargo nextest run ${{ matrix.cargo_flags }} \
              --filter-expr 'not package(=validator)'
          else
            RUSTFLAGS="-D warnings" cargo nextest run ${{ matrix.cargo_flags }} \
              --filter-expr 'not package(=validator)'
          fi

  validator-sqlite:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
      HX_BIN_DIR: ${{ github.workspace }}/.bin
      HX_WORK_ROOT: ${{ github.workspace }}/.cache/hx
      HX_SRC_LINK: ${{ github.workspace }}/.cache/synhx-client
      MXD_VALIDATOR_FAIL_CLOSED: "true"
      MXD_TEST_BIND_HOST: "127.0.0.1"
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: leynos/shared-actions/.github/actions/setup-rust@18bed1ca49a6de3d8882bd72635a32ae3f023d57
        with:
          install-sqlite-deps: true
      - name: Cache Cargo directories
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Add validator bin directory to PATH
        run: echo "${HX_BIN_DIR}" >> "${GITHUB_PATH}"
      - name: Install SynHX
        run: ./scripts/install-synhx.sh
      - name: Sanity-check hx does not report Helix
        run: |
          set -o pipefail
          timeout 1 hx --version 2>&1 | tee /tmp/hx-version.log || true
          if rg -qi 'helix' /tmp/hx-version.log; then
            echo "hx resolves to Helix, not SynHX" >&2
            exit 1
          fi
      - name: Build wireframe server for validator
        run: make validator-sqlite-server
      - name: Run validator harness
        run: make test-validator-sqlite

  coverage:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
      HX_BIN_DIR: ${{ github.workspace }}/.bin
      HX_WORK_ROOT: ${{ github.workspace }}/.cache/hx
      HX_SRC_LINK: ${{ github.workspace }}/.cache/synhx-client
      MXD_VALIDATOR_FAIL_CLOSED: "true"
      MXD_TEST_BIND_HOST: "127.0.0.1"
    steps:
      # CodeScene's PR gate runs `cs-coverage check`, which diffs the PR
      # against its merge base, so the full history must be reachable.
      # The default merge-ref checkout matches CodeScene's documented
      # example.
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - uses: leynos/shared-actions/.github/actions/setup-rust@18bed1ca49a6de3d8882bd72635a32ae3f023d57
        with:
          install-sqlite-deps: true
          install-postgres-deps: true
      - name: Cache Cargo directories
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Add validator bin directory to PATH
        run: echo "${HX_BIN_DIR}" >> "${GITHUB_PATH}"
      - name: Install SynHX
        run: ./scripts/install-synhx.sh
      - name: Sanity-check hx does not report Helix
        run: |
          set -o pipefail
          timeout 1 hx --version 2>&1 | tee /tmp/hx-version.log || true
          if rg -qi 'helix' /tmp/hx-version.log; then
            echo "hx resolves to Helix, not SynHX" >&2
            exit 1
          fi
      - name: Build wireframe server for coverage
        run: make validator-sqlite-server validator-postgres-server
      - uses: taiki-e/install-action@v2.82.5
        with:
          tool: cargo-llvm-cov
      - uses: oven-sh/setup-bun@v2
      - uses: ./.github/actions/export-postgres-url
        with:
          url: postgres://postgres:password@127.0.0.1/test
      # The ratchet supports one baseline per job, so the sqlite leg
      # (the default feature set and broadest suite) carries it. The
      # authoritative baseline is the cache saved by coverage-main.yml
      # on main, which every PR run can restore; baselines saved here
      # stay scoped to the PR branch.
      - name: Generate coverage for SQLite
        uses: leynos/shared-actions/.github/actions/generate-coverage@18bed1ca49a6de3d8882bd72635a32ae3f023d57
        env:
          MXD_VALIDATOR_SERVER_BINARY: ${{ github.workspace }}/target/debug/mxd-wireframe-server
        with:
          features: sqlite test-support
          output-path: lcov-sqlite.info
          format: lcov
          artefact-name-suffix: sqlite
          with-ratchet: 'true'
      - name: Generate coverage for Postgres
        uses: leynos/shared-actions/.github/actions/generate-coverage@18bed1ca49a6de3d8882bd72635a32ae3f023d57
        env:
          MXD_VALIDATOR_SERVER_BINARY: ${{ github.workspace }}/target/postgres/debug/mxd-wireframe-server
          POSTGRES_TEST_URL: postgres://postgres:password@127.0.0.1/test
        with:
          with-default-features: false
          features: postgres test-support
          output-path: lcov-postgres.info
          format: lcov
          artefact-name-suffix: postgres
      - name: Merge coverage results
        run: bun x lcov-result-merger 'lcov-*.info' > lcov.info
      # CodeScene's "Code Coverage" PR check is driven by `cs-coverage
      # check` (uploads are only accepted for analysed branches, i.e.
      # main); without this step the check times out and blocks
      # Dependabot automerge. Guarded so runs without the secret (e.g.
      # forks) skip the gate instead of failing.
      - name: Check coverage against CodeScene gates
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: env.CS_ACCESS_TOKEN != ''
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@e0d9b652b137eb15314fff188f09e1ba18d3cc5b
        with:
          format: lcov
          mode: check
          project-url: https://api.codescene.io/v2/projects/68298
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}
